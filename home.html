<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./images/girlypop-favicon.svg" />
    <title>Your Home - GirlyPop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css-files/home.css">
</head>
<body>

    <section class="product-page">
        <div class="product-details">
        
        </div>
    </section>

    <nav>
        <div class="logo-box">

        </div>

        <div class="search-bar">
            <input type="text" placeholder="Search...">
            <i class="bi bi-search-heart"></i>
        </div>

        <div class="navigations-sm">
            <i class="bi bi-list burger"></i>
            <div class="navs-sm"> 
                <p class="bi moves bi-house bi-filled">Home</p>
                <p class="bi moves bi-bag">Cart (0)</p>
                <p class="bi moves bi-person">Profile</p>
            </div>
        </div>

        <div class="navigations">
            <button class="bi moves bi-house bi-filled">

            </button>
            
            <button class="bi moves bi-bag">
                <p class="cart-count">0</p>
            </button>
            
            <button class="bi moves bi-person">

            </button>
        </div>
    </nav>

    <section class="category-select">
        
        <div class="category-indicator">
            <span class="category-title">Sort</span>
            <i class="bi bi-arrow-right-short indicator-stat"></i>
        </div>

        <div class="categories">
            <span class="category">Tops</span>
            <span class="category">Bottoms</span>
            <span class="category">Accessories</span>
            <span class="category">Dresses</span>
            <span class="category">Shoes</span>
            <span class="category">Bags</span>
        </div>

    </section>

    <section class="featured">
        <h3>Featured Products</h3>
        <div class="featured-products">
           
            <div class="scroll-cont">

            </div>

            <div aria-hidden="true" class="scroll-cont extra-scroll-cont">

            </div>
            
        </div>
    </section>

    <section class="for-you">
        <h3>For You</h3>
        <div class="products-cont">
            <div class="grid-cont">
                
            </div>
        </div>
    </section>

    <footer>
        <p>© 2025 GirlyPop. All rights reserved.</p>
        <div class="contact">
            <i class="bi bi-facebook"></i>
            <i class="bi bi-twitter-x"></i>
            <i class="bi bi-instagram"></i>
        </div>
    </footer> 

    <script type="module" src="./new-js-files/homeO.js"></script>
</body>
</html>
